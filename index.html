  <header class="toolbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 100 100"><use href="#flower"/></svg>
      </span>
      <strong>Semester Calendar</strong>
    </div>
    <div class="toolbar-controls">
      <span id="file-status" class="status-chip">Disconnected</span>
      <button id="reconnect-btn" class="btn btn-ghost" type="button">Reconnect</button>
      <button id="add-task-btn" class="btn btn-primary" type="button">+ Add task</button>
      <label class="filter-label">
        <span>Class</span>
        <select id="class-filter"><option value="">All classes</option></select>
      </label>
    </div>
  </header>

  <main>
    <div class="calendar-card">
      <div id="calendar"></div>
    </div>

    <div class="form-overlay" data-form-overlay hidden>
      <form id="add-task-form" hidden>
        <h2>Add a task</h2>
        <label>Title <input id="task-title" type="text" required></label>
        <label>Class <input id="task-class" type="text" list="class-options"></label>
        <datalist id="class-options"></datalist>
        <label>Due date <input id="task-due-date" type="date" required></label>
        <label>Importance
          <select id="task-importance">
            <option value="0">0 — low</option>
            <option value="1" selected>1 — normal</option>
            <option value="2">2 — high</option>
            <option value="3">3 — critical</option>
          </select>
        </label>
        <label>Notes <textarea id="task-notes" rows="3"></textarea></label>
        <div class="form-actions">
          <button id="add-task-cancel" class="btn btn-ghost" type="button">Cancel</button>
          <button id="add-task-submit" class="btn btn-primary" type="submit">Save</button>
        </div>
      </form>
    </div>
  </main>
</body>
